<div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 modal-overlay">
    <div class="bg-white rounded-xl p-6 max-w-xs w-full text-center shadow-xl animate-[bounce_0.5s_ease-out] modal-content">
        <div class="text-5xl mb-4 modal-emoji">🎉</div>
        <h2 class="text-3xl font-bold text-amber-500 mb-2">BINGO!</h2>
        <p class="text-gray-600 mb-6">YOU COMPLETED A LINE!</p>

        <button
            hx-post="/dismiss-modal"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full bg-accent text-white font-semibold py-3 px-6 rounded-lg active:bg-accent-light transition-colors keep-playing-button">
            KEEP PLAYING
        </button>
    </div>
</div>
