name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Prepare deployment
        run: |
          set -e
          mkdir -p ./_site/app/static

          # Copy docs (lab guide pages) to _site root
          cp -r docs/* ./_site/

          # Copy static assets
          cp -r app/static/* ./_site/app/static/

          # Generate the game home page as static HTML
          uv run python scripts/build_static.py

          # Validate the generated file exists and has content
          echo "--- Generated index.html (first 10 lines) ---"
          head -10 ./_site/index.html

          touch ./_site/.nojekyll

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
